<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>《粵語（香港話）教程》音頻</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --panel: #ffffff;
      --ink: #222222;
      --muted: #6d6a63;
      --line: #ded8cc;
      --accent: #16745f;
      --accent-dark: #0e5b4a;
      --accent-soft: #dceee9;
      --warn: #9a5b10;
      --shadow: 0 18px 46px rgba(45, 37, 25, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(22, 116, 95, 0.08), transparent 36%),
        linear-gradient(315deg, rgba(156, 86, 28, 0.08), transparent 32%),
        var(--bg);
    }

    button,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 92px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      text-align: right;
    }

    .stat strong {
      display: block;
      font-size: 1.25rem;
      color: var(--accent-dark);
    }

    .stat span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar {
      position: sticky;
      top: 18px;
      max-height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
    }

    .search {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
    }

    .search input {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    .search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 116, 95, 0.14);
    }

    .chapter-list {
      overflow: auto;
      padding: 8px;
    }

    .chapter-button {
      width: 100%;
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--ink);
      background: transparent;
      text-align: left;
    }

    .chapter-button:hover {
      background: #f3efe7;
    }

    .chapter-button[aria-current="true"] {
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 700;
    }

    .chapter-num {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #eee7da;
      color: var(--accent-dark);
      font-weight: 700;
    }

    .chapter-button[aria-current="true"] .chapter-num {
      background: var(--accent);
      color: #fff;
    }

    .chapter-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chapter-count {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .player {
      padding: 22px;
    }

    .lesson-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .lesson-heading h2 {
      margin: 0;
      font-size: clamp(1.45rem, 2.4vw, 2.35rem);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .lesson-meta {
      margin-top: 8px;
      color: var(--muted);
    }

    .nav-buttons {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      background: #efe8dc;
      color: var(--ink);
      font-size: 1.15rem;
    }

    .icon-button:hover {
      background: #e5dccd;
    }

    .audio-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: #fbfaf7;
    }

    .audio-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
    }

    .audio-row label,
    .rate label,
    .notes label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    select {
      width: 100%;
      min-height: 42px;
      padding: 0 38px 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 116, 95, 0.14);
    }

    .rate {
      min-width: 130px;
    }

    audio {
      width: 100%;
      display: block;
    }

    .playlist {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
      gap: 8px;
      margin-top: 16px;
    }

    .track-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
    }

    .track-button:hover {
      border-color: var(--accent);
    }

    .track-button[aria-current="true"] {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .notes {
      margin-top: 18px;
    }

    textarea {
      width: 100%;
      min-height: 170px;
      resize: vertical;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 116, 95, 0.14);
    }

    .empty {
      padding: 18px;
      border: 1px solid #e5c991;
      border-radius: 8px;
      background: #fff7e8;
      color: var(--warn);
    }

    @media (max-width: 820px) {
      .app {
        width: min(100% - 22px, 720px);
        padding: 18px 0;
      }

      .topbar,
      .lesson-heading,
      .audio-row {
        display: block;
      }

      .stats,
      .nav-buttons {
        justify-content: flex-start;
        margin-top: 14px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        max-height: 360px;
      }

      .player {
        padding: 16px;
      }

      .rate {
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>《粵語（香港話）教程》音頻</h1>
      </div>
    </header>

    <section class="layout">
      <aside class="panel sidebar" aria-label="課文目錄">
        <div class="search">
          <input id="searchInput" type="search" placeholder="搜尋課文或者拼音" autocomplete="off">
        </div>
        <div id="chapterList" class="chapter-list"></div>
      </aside>

      <section class="panel player" aria-live="polite">
        <div class="lesson-heading">
          <div>
            <h2 id="currentTitle"></h2>
            <div id="currentMeta" class="lesson-meta"></div>
          </div>
          <div class="nav-buttons">
            <button id="prevLesson" class="icon-button" type="button" title="上一課" aria-label="上一課">‹</button>
            <button id="nextLesson" class="icon-button" type="button" title="下一課" aria-label="下一課">›</button>
          </div>
        </div>

        <div id="audioArea" class="audio-card"></div>

        <div class="notes">
          <label for="notes">課堂筆記</label>
          <textarea id="notes" placeholder="喺度輸入你嘅粵語拼音或者筆記..."></textarea>
        </div>
      </section>
    </section>
  </main>

  <script>
    const chapters = [
      { num: 0, title: "00 入門錄音", romanization: "" },
      { num: 1, title: "01 介紹", romanization: "Gai3xiu6" },
      { num: 2, title: "02 問候", romanization: "Men6heo6" },
      { num: 3, title: "03 打電話", romanization: "Da2 din6wa2" },
      { num: 4, title: "04 約會", romanization: "Yeg3wui6" },
      { num: 5, title: "05 問路", romanization: "Men6lou6" },
      { num: 6, title: "06 購物", romanization: "Geo3med6" },
      { num: 7, title: "07 交通", romanization: "Gao1tung1" },
      { num: 8, title: "08 天氣", romanization: "Tin1hei3" },
      { num: 9, title: "09 飲食", romanization: "Yem2xig6" },
      { num: 10, title: "10 香港", romanization: "Heng1gong2" },
      { num: 11, title: "11 開戶口", romanization: "Hoi1 wu6heo2" },
      { num: 12, title: "12 買餸", romanization: "Mai5sung3" },
      { num: 13, title: "13 外出旅遊", romanization: "Ngoi6ced1 lau5yeo4" },
      { num: 14, title: "14 睇醫生", romanization: "Tei2 yi1seng1" },
      { num: 15, title: "15 清潔香港", romanization: "Qing1gid3 Heng1gong2" },
      { num: 16, title: "16 搵學校", romanization: "Wen2 hog6hao6" },
      { num: 17, title: "17 晨運", romanization: "Sen4wen6" },
      { num: 18, title: "18 搵工跳槽", romanization: "Wen2gung1 tiu3cou4" },
      { num: 19, title: "19 打“九九九”", romanization: "Da2 geo2-geo2-geo2" },
      { num: 20, title: "20 香港話", romanization: "Heng1gong2wa2" },
      { num: 21, title: "21 報紙", romanization: "Bou3ji2" },
      { num: 22, title: "22 交通運輸", romanization: "Gao1tung1 wen6xu1" },
      { num: 23, title: "23 海洋公園", romanization: "Hoi2yeng4 gung1yun2" },
      { num: 24, title: "24 黃大仙", romanization: "Wong4dai6xin1" },
      { num: 25, title: "25 電視文化", romanization: "Din6xi6 men4fa3" },
      { num: 26, title: "26 食在香港", romanization: "Xig6 zoi6 Heng1gong2" },
      { num: 27, title: "27 “女人街”", romanization: "Neu5yen2gai1" },
      { num: 28, title: "28 “居者有其屋”", romanization: "Geu1ze2 yeo5 kei4 ug1" },
      { num: 29, title: "29 貪字變貧字", romanization: "Tam1 ji6 bin3 pen4 ji6" },
      { num: 30, title: "30 話說移民", romanization: "Wa6xud3 yi4men4" }
    ];

    const trackCounts = {
      0: 2,
      1: 5, 2: 5, 3: 5, 4: 5, 5: 5, 6: 5, 7: 4,
      8: 4, 9: 4, 10: 4, 11: 4, 12: 4, 13: 4, 14: 4, 15: 4,
      16: 4, 17: 4, 18: 4, 19: 4, 20: 4,
      21: 5, 22: 5, 23: 5, 24: 5, 25: 5, 26: 5, 27: 5, 28: 5, 29: 5, 30: 5
    };

    const state = {
      chapterIndex: 1,
      trackIndex: 0,
      rate: 1
    };

    const chapterList = document.querySelector("#chapterList");
    const searchInput = document.querySelector("#searchInput");
    const currentTitle = document.querySelector("#currentTitle");
    const currentMeta = document.querySelector("#currentMeta");
    const audioArea = document.querySelector("#audioArea");
    const notes = document.querySelector("#notes");
    const prevLesson = document.querySelector("#prevLesson");
    const nextLesson = document.querySelector("#nextLesson");
    function getTracks(chapterNum) {
      const count = trackCounts[chapterNum] || 0;
      return Array.from({ length: count }, (_, index) => `${chapterNum}-${index + 1}.mp3`);
    }

    function noteKey(chapterNum) {
      return `cantonese-notes-${chapterNum}`;
    }

    function renderChapterList() {
      const query = searchInput.value.trim().toLowerCase();
      chapterList.innerHTML = "";

      chapters
        .filter((chapter) => {
          const haystack = `${chapter.title} ${chapter.romanization}`.toLowerCase();
          return haystack.includes(query);
        })
        .forEach((chapter) => {
          const index = chapters.indexOf(chapter);
          const button = document.createElement("button");
          button.type = "button";
          button.className = "chapter-button";
          button.setAttribute("aria-current", index === state.chapterIndex ? "true" : "false");
          button.innerHTML = `
            <span class="chapter-num">${String(chapter.num).padStart(2, "0")}</span>
            <span class="chapter-title">${chapter.title}${chapter.romanization ? ` ${chapter.romanization}` : ""}</span>
            <span class="chapter-count">${getTracks(chapter.num).length}</span>
          `;
          button.addEventListener("click", () => {
            state.chapterIndex = index;
            state.trackIndex = 0;
            render();
          });
          chapterList.appendChild(button);
        });
    }

    function renderPlayer() {
      const chapter = chapters[state.chapterIndex];
      const tracks = getTracks(chapter.num);
      const activeTrack = tracks[state.trackIndex];

      currentTitle.textContent = chapter.title;
      currentMeta.textContent = chapter.romanization
        ? `${chapter.romanization} · ${tracks.length} 段錄音`
        : `${tracks.length} 段錄音`;
      notes.value = localStorage.getItem(noteKey(chapter.num)) || "";

      if (!tracks.length) {
        audioArea.innerHTML = `<div class="empty">未搵到呢課嘅錄音。</div>`;
        return;
      }

      audioArea.innerHTML = `
        <div class="audio-row">
          <div>
            <label for="trackSelect">錄音片段</label>
            <select id="trackSelect">
              ${tracks.map((track, index) => `
                <option value="${index}" ${index === state.trackIndex ? "selected" : ""}>${track}</option>
              `).join("")}
            </select>
          </div>
          <div class="rate">
            <label for="rateSelect">播放速度</label>
            <select id="rateSelect">
              ${[0.75, 1, 1.25, 1.5].map((rate) => `
                <option value="${rate}" ${rate === state.rate ? "selected" : ""}>${rate}x</option>
              `).join("")}
            </select>
          </div>
        </div>
        <audio id="audioPlayer" controls preload="metadata" src="audio/${activeTrack}"></audio>
        <div class="playlist">
          ${tracks.map((track, index) => `
            <button class="track-button" type="button" data-track="${index}" aria-current="${index === state.trackIndex ? "true" : "false"}">
              ${track}
            </button>
          `).join("")}
        </div>
      `;

      const player = document.querySelector("#audioPlayer");
      const trackSelect = document.querySelector("#trackSelect");
      const rateSelect = document.querySelector("#rateSelect");

      player.playbackRate = state.rate;
      trackSelect.addEventListener("change", (event) => {
        state.trackIndex = Number(event.target.value);
        renderPlayer();
      });
      rateSelect.addEventListener("change", (event) => {
        state.rate = Number(event.target.value);
        player.playbackRate = state.rate;
      });
      player.addEventListener("ended", () => {
        if (state.trackIndex < tracks.length - 1) {
          state.trackIndex += 1;
          renderPlayer();
          const nextPlayer = document.querySelector("#audioPlayer");
          nextPlayer.play().catch(() => {});
        }
      });
      document.querySelectorAll(".track-button").forEach((button) => {
        button.addEventListener("click", () => {
          state.trackIndex = Number(button.dataset.track);
          renderPlayer();
        });
      });
    }

    function render() {
      renderChapterList();
      renderPlayer();
    }

    searchInput.addEventListener("input", renderChapterList);
    notes.addEventListener("input", () => {
      const chapter = chapters[state.chapterIndex];
      localStorage.setItem(noteKey(chapter.num), notes.value);
    });
    prevLesson.addEventListener("click", () => {
      state.chapterIndex = (state.chapterIndex - 1 + chapters.length) % chapters.length;
      state.trackIndex = 0;
      render();
    });
    nextLesson.addEventListener("click", () => {
      state.chapterIndex = (state.chapterIndex + 1) % chapters.length;
      state.trackIndex = 0;
      render();
    });

    render();
  </script>
</body>
</html>
